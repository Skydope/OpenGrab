services:
  opengrab:
    build: .
    container_name: opengrab
    ports:
      - "${OPENGRAB_PORT:-8800}:8800"
    volumes:
      - ./downloads:/downloads
    environment:
      - OPENGRAB_HOST=0.0.0.0
      - OPENGRAB_PORT=8800
      - OPENGRAB_DIR=/downloads
      - OPENGRAB_TOKEN=${OPENGRAB_TOKEN:-}
      - OPENGRAB_MAX_JOBS=${OPENGRAB_MAX_JOBS:-2}
      - OPENGRAB_MAX_SIZE_MB=${OPENGRAB_MAX_SIZE_MB:-0}
      - OPENGRAB_AUTOUPDATE=${OPENGRAB_AUTOUPDATE:-1}
      - OPENGRAB_TRUST_XFF=${OPENGRAB_TRUST_XFF:-0}
    restart: unless-stopped
