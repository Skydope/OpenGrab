# ─────────────────────────────────────────────
# opengrab.nuc.home → wrapper yt-dlp (descargas YouTube→mp4)
# Drop-in para ./nginx/conf/  (nginx carga todos los .conf de conf.d)
#
# Particularidades vs el resto del stack:
#   - resolver 127.0.0.11 (DNS Docker): nginx no muere si opengrab está caído
#     (mismo patrón que portainer). Devuelve 502 en vez de no arrancar.
#   - proxy_buffering off + timeouts largos: el progreso va por SSE y los
#     archivos pueden ser grandes. Con buffering on, SSE no fluye y se corta.
#
# OJO con el cert: regenerá git.nuc.home+5.pem incluyendo grab.nuc.home
# (instrucciones en el mensaje). El wildcard *.nuc.home de AdGuard ya resuelve.
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name grab.nuc.home;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grab.nuc.home;

    ssl_certificate     /etc/nginx/certs/git.nuc.home+5.pem;
    ssl_certificate_key /etc/nginx/certs/git.nuc.home+5-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    location / {
        resolver 127.0.0.11 valid=30s;     # ← DNS interno de Docker
        set $opengrab http://opengrab:8800;
        proxy_pass $opengrab;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # keepalive correcto hacia el upstream
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # SSE (progreso) + descargas largas: nada de buffering, timeouts amplios
        proxy_buffering    off;
        proxy_cache        off;
        proxy_connect_timeout 10s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }
