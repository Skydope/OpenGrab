[project]
name = "opengrab"
version = "1.6.0"
requires-python = ">=3.11"
description = "Self-hosted YouTube downloader — paste a URL, get an MP4"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "mypy>=1.15",
]
desktop = ["pywebview>=5.0"]
build = ["pyinstaller>=6.0"]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["app", "config", "desktop", "download", "engine_update", "models", "routes", "state"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
exclude = ["tests/"]
