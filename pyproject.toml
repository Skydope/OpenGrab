[project]
name = "opengrab"
version = "1.1.0"
requires-python = ">=3.11"
description = "Self-hosted YouTube downloader — paste a URL, get an MP4"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
