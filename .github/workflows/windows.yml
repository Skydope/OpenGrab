name: windows

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: pip install -e ".[desktop,build]"

      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-tmp
          $ffmpegDir = Get-ChildItem -Directory ffmpeg-tmp | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" vendor\ffmpeg.exe

      - name: Download WebView2 bootstrapper
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "vendor\MicrosoftEdgeWebview2Setup.exe"

      - name: Generate wizard images
        run: |
          python -c "
          from PIL import Image, ImageDraw

          def make_wizard(w, h, out):
              img = Image.new('RGB', (w, h), (28, 33, 43))
              draw = ImageDraw.Draw(img)
              cx, cy = w // 2, h // 2
              s = min(w, h) // 3
              draw.polygon([
                  (cx - s // 2, cy - s // 2),
                  (cx - s // 2, cy + s // 2),
                  (cx + s // 2, cy),
              ], fill=(232, 160, 44))
              img.save(out)

          make_wizard(164, 314, 'vendor/wizard-image.bmp')
          make_wizard(55, 55, 'vendor/wizard-small.bmp')
          "

      - name: Build with PyInstaller
        run: pyinstaller OpenGrab.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Extract version
        id: version
        run: |
          $v = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Compile Setup.exe
        run: iscc /DAPP_VERSION="${{ steps.version.outputs.VERSION }}" opengrab.iss

      - name: Package portable zip
        run: Compress-Archive -Path dist\OpenGrab\* -DestinationPath dist\OpenGrab-portable.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist\OpenGrab-Setup.exe
            dist\OpenGrab-portable.zip

      - name: VirusTotal scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          update_release_body: true
          request_rate: 4
          files: |
            dist/OpenGrab-Setup.exe
            dist/OpenGrab-portable.zip