<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenGrab</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/alpine.min.js" defer></script>
</head>
<body>
<div class="wrap" x-data="app" x-init="init()">

  <header>
    <span class="logo">Open<b>Grab</b></span>
    <span class="tag"><span class="dot"></span>self-hosted · yt-dlp</span>
    <button class="theme-btn" @click="toggleTheme" :aria-label="theme==='dark'?'Tema claro':'Tema oscuro'"
            x-text="theme==='dark'?'☀️':'🌙'"></button>
  </header>

  <!-- Auth card -->
  <div class="card auth-card" x-show="!authenticated" x-cloak>
    <label class="fld" for="token">Token de acceso</label>
    <div class="row">
      <input id="token" type="password"               placeholder="Ingresa el token configurado en OPENGRAB_TOKEN"
             autocomplete="off" spellcheck="false" x-model="token"
             @keydown.enter="doAuth">
      <button class="go" @click="doAuth" :disabled="authLoading">
        <span x-show="!authLoading">Conectar</span>
        <span x-show="authLoading">…</span>
      </button>
    </div>
  </div>

  <!-- Main card -->
  <div class="card" x-show="authenticated" x-cloak>
    <label class="fld" for="url">URL del video</label>
    <div class="row">
      <input id="url" type="text" placeholder="https://…"
             autocomplete="off" spellcheck="false" x-model="url"
             @keydown.enter="inspect">
      <button class="copy-btn" @click="copyCommand" :disabled="!url"
              :class="{copied: cmdCopied}" x-text="cmdCopied ? '✓' : '📋'"
              title="Copiar comando yt-dlp"></button>
      <button class="go" @click="inspect" :disabled="inspecting">
        <span x-show="!inspecting">Analizar</span>
        <span x-show="inspecting">…</span>
      </button>
    </div>

    <!-- Video metadata -->
    <div class="meta" x-show="meta" x-transition>
      <img class="thumb" :src="thumbnail" alt="">
      <div class="info">
        <p class="t" x-text="title">—</p>
        <p class="s" x-text="subtitle">—</p>
      </div>
    </div>

    <!-- Quality chips -->
    <div class="quality">
      <template x-for="q in qualities" :key="q.id">
        <span class="chip" :data-q="q.id"
              :aria-pressed="quality === q.id" role="radio" tabindex="0"
              @click="quality = q.id"
              @keydown.enter.prevent="quality = q.id"
              @keydown.space.prevent="quality = q.id"
              x-text="q.label"></span>
      </template>
    </div>

    <!-- Format preview -->
    <div x-show="formats.length" class="mt-14">
      <div class="toggle-label"
           role="button" tabindex="0" :aria-expanded="showFormats"
           @click="showFormats = !showFormats"
           @keydown.enter.prevent="showFormats = !showFormats"
           @keydown.space.prevent="showFormats = !showFormats"
           x-text="showFormats ? 'formatos ▾' : 'formatos ▸ (' + formats.length + ')'"></div>
      <table class="fmt-table" x-show="showFormats">
        <thead><tr><th>Calidad</th><th>Codec</th><th class="fsize">Tamaño</th></tr></thead>
        <tbody>
          <template x-for="f in formats" :key="f.format_id">
            <tr role="button" tabindex="0"
                @click="quality = f.format_id"
                @keydown.enter.prevent="quality = f.format_id"
                @keydown.space.prevent="quality = f.format_id"
                :class="{sel: quality === f.format_id}">
              <td x-text="f.format_note || f.resolution || f.format_id"></td>
              <td x-text="(f.vcodec||'?') + ' / ' + (f.acodec||'?')"></td>
              <td class="fsize" x-text="f.filesize ? (f.filesize/1048576).toFixed(1)+' MB' : '—'"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Playlist panel -->
    <div x-show="isPlaylist" x-transition class="mt-14">
      <div class="pl-header">
        <span class="pl-count" x-text="playlistCount + ' videos'"></span>
        <button class="btn-sm" @click="downloadPlaylist">Descargar playlist</button>
      </div>
      <div class="pl-list">
        <template x-for="(v, i) in playlistVideos" :key="v.url">
          <div class="pl-video">
            <input type="checkbox" x-model="playlistChecked" :value="i">
            <span class="pl-title" :title="v.title" x-text="v.title"></span>
            <span class="pl-dur" x-text="v.duration ? fmtDuration(v.duration) : ''"></span>
          </div>
        </template>
        <span x-show="playlistLoading" class="loading-msg">Cargando playlist…</span>
      </div>
    </div>

    <div class="mt-18">
      <button @click="download" :disabled="!meta || downloading" class="btn-block">Descargar</button>
    </div>

    <!-- Terminal output -->
    <div class="term" :class="{show: terminal.length > 0}">
      <div class="bar-head">
        <span class="tl"><i></i><i></i><i></i></span>
        <span>yt-dlp</span>
      </div>
      <div class="progress" :class="{done: progressDone}">
        <i :style="'width:' + progress + '%'"></i>
      </div>
      <div class="lines" x-ref="lines" x-effect="if($refs.lines && terminal.length) $refs.lines.scrollTop = $refs.lines.scrollHeight">
        <template x-for="(line, idx) in terminal" :key="idx">
          <p class="l" :class="line.cls" :data-live="line.live ? '1' : null">
            <span class="pfx" x-text="line.pfx"></span>
            <span class="body" x-text="line.text"></span>
          </p>
        </template>
      </div>
    </div>

    <!-- Error -->
    <div class="err-box" :class="{show: errorMsg}">
      <span x-text="errorMsg"></span>
      <button class="btn-sm retry-btn" x-show="canRetry" @click="download"
              aria-label="Reintentar la descarga">Reintentar</button>
    </div>

    <!-- Download link -->
    <div class="actions" :class="{show: downloadUrl}">
      <a class="dl" :href="downloadUrl" :download="downloadFilename">Guardar archivo</a>
    </div>

    <!-- Success banner -->
    <div class="success-box" :class="{show: successPath}" x-transition>
      <span class="success-icon">✓</span>
      <span class="success-path" x-text="successPath"></span>
      <button class="folder-btn" @click="openFolder(lastJobId)" :disabled="!lastJobId">
        Abrir carpeta
      </button>
    </div>
  </div>

  <footer>
    Corre en tu red. El servidor descarga con <code>yt-dlp</code> + <code>ffmpeg</code> y te entrega el <code>.mp4</code>.<br>
    Usalo solo con contenido propio, con licencia que lo permita, o bajo fair use.
  </footer>

  <!-- History -->
  <div class="mt-14" x-show="authenticated" x-cloak>
    <div class="toggle-label-lg"
         role="button" tabindex="0" :aria-expanded="historyOpen"
         @click="toggleHistory"
         @keydown.enter.prevent="toggleHistory"
         @keydown.space.prevent="toggleHistory"
         x-text="historyOpen ? 'historial ▾' : 'historial ▸'"></div>
    <div x-show="historyOpen">
      <span x-show="!historyLoaded" class="muted-sm">Cargando…</span>
      <span x-show="historyLoaded && !history.length" class="muted-sm">Sin descargas todavía.</span>
      <template x-for="e in history" :key="e.job_id">
        <div class="h-entry">
          <img class="h-thumb" x-show="e.thumbnail" :src="e.thumbnail" alt="" loading="lazy">
          <span class="h-title" :title="e.title" x-text="e.title"></span>
          <span class="h-meta" x-text="e.quality"></span>
          <span class="h-size" x-show="e.size" x-text="(e.size/1048576).toFixed(1) + ' MB'"></span>
        </div>
      </template>
      <div class="engine-row">
        <button class="btn-sm" @click="updateEngine" :disabled="engineUpdating"
                aria-label="Actualizar el motor de descarga yt-dlp"
                x-text="engineUpdating ? 'Actualizando…' : 'Actualizar motor (yt-dlp)'"></button>
        <span class="muted-sm" x-show="engineMsg" x-text="engineMsg" aria-live="polite"></span>
      </div>
    </div>
  </div>

</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('app', () => ({
    // ── Auth ──────────────────────────────────
    AUTH_REQUIRED: "__AUTH_REQUIRED__" === "true",
    FORMATS: __FORMATS_JSON__,
    token: "",
    authLoading: false,
    authenticated: false,

    // ── Theme ─────────────────────────────────
    theme: "dark",

    initTheme() {
      const saved = localStorage.getItem("opengrab-theme");
      if (saved) {
        this.theme = saved;
      } else {
        this.theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      this.applyTheme();
    },
    toggleTheme() {
      this.theme = this.theme === "dark" ? "light" : "dark";
      localStorage.setItem("opengrab-theme", this.theme);
      this.applyTheme();
    },
    applyTheme() {
      document.documentElement.setAttribute("data-theme", this.theme);
    },

    async init() {
      this.initTheme();
      if (!this.AUTH_REQUIRED) { this.authenticated = true; return; }
      try {
        const r = await fetch("/api/history?limit=1");
        this.authenticated = r.status !== 401;
      } catch (e) {
        this.authenticated = false;
      }
    },

    async doAuth() {
      if (!this.token.trim()) return;
      this.authLoading = true;
      const r = await fetch("/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: this.token.trim() }),
      });
      if (r.ok) {
        this.authenticated = true;
      } else {
        this.errorMsg = "Token invalido.";
      }
      this.authLoading = false;
    },

    // ── Quality ───────────────────────────────
    quality: "best",
    qualities: [
      { id: "best",  label: "best mp4" },
      { id: "1080p", label: "1080p" },
      { id: "720p",  label: "720p" },
      { id: "480p",  label: "480p" },
      { id: "audio", label: "solo audio · mp3" },
    ],
    formats: [],
    showFormats: false,

    // ── Engine (yt-dlp hot-swap) ──────────────
    engineUpdating: false,
    engineMsg: "",

    // ── URL / inspect ─────────────────────────
    url: "",
    inspecting: false,
    meta: false,
    thumbnail: "",
    title: "—",
    subtitle: "—",
    cmdCopied: false,

    // ── Playlist ──────────────────────────────
    isPlaylist: false,
    playlistCount: 0,
    playlistVideos: [],
    playlistChecked: [],
    playlistLoading: false,

    // ── Download ──────────────────────────────
    downloading: false,
    terminal: [],
    progress: 0,
    progressDone: false,
    downloadUrl: "",
    downloadFilename: "",
    successPath: "",
    lastJobId: "",

    // ── Error ─────────────────────────────────
    errorMsg: "",
    canRetry: false,

    // ── History ───────────────────────────────
    historyOpen: false,
    historyLoaded: false,
    history: [],

    // ── Inspect ───────────────────────────────
    async inspect() {
      if (!this.url.trim()) { this.errorMsg = "Pega una URL primero."; return; }
      this.resetUI();
      this.inspecting = true;
      try {
        const r = await fetch("/api/info?url=" + encodeURIComponent(this.url.trim()));
        if (!r.ok) {
          let msg = "Error al analizar.";
          try { msg = (await r.json()).detail || msg; } catch (e) {}
          throw new Error(msg);
        }
        const data = await r.json();
        this.meta = true;
        this.thumbnail = data.thumbnail || "";
        this.title = data.title || "—";
        const views = data.view_count
          ? " · " + Intl.NumberFormat("es-AR").format(data.view_count) + " views"
          : "";
        this.subtitle = (data.channel || "") + " · " + (data.duration_str || "") + views;
        this.formats = data.formats || [];
        this.showFormats = false;

        if (/[?&]list=/.test(this.url)) {
          this.isPlaylist = true;
          this.loadPlaylist();
        } else {
          this.isPlaylist = false;
        }
      } catch (err) {
        this.meta = false;
        this.errorMsg = err.message;
      } finally {
        this.inspecting = false;
      }
    },

    async copyCommand() {
      const fmt = this.FORMATS[this.quality] || this.quality;
      const cmd = 'yt-dlp -f "' + fmt + '" --merge-output-format mp4 "' + this.url.trim() + '"';
      try {
        await navigator.clipboard.writeText(cmd);
      } catch (e) {
        const ta = document.createElement("textarea");
        ta.value = cmd; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
      }
      this.cmdCopied = true;
      setTimeout(() => { this.cmdCopied = false; }, 2000);
    },

    // ── Playlist ──────────────────────────────
    async loadPlaylist() {
      this.playlistLoading = true;
      this.playlistChecked = [];
      try {
        const r = await fetch("/api/playlist?url=" + encodeURIComponent(this.url.trim()));
        if (!r.ok) {
          let msg = "Error al cargar playlist.";
          try { msg = (await r.json()).detail || msg; } catch (e) {}
          throw new Error(msg);
        }
        const data = await r.json();
        this.playlistVideos = data.videos || [];
        this.playlistCount = data.count || 0;
        this.playlistChecked = this.playlistVideos.map((_, i) => i);
      } catch (err) {
        this.playlistVideos = [];
        this.errorMsg = err.message;
      } finally {
        this.playlistLoading = false;
      }
    },

    async downloadPlaylist() {
      const selected = this.playlistChecked.map(i => this.playlistVideos[i]).filter(Boolean);
      if (!selected.length) { this.errorMsg = "Selecciona al menos un video."; return; }
      this.resetUI();
      this.downloading = true;
      this.addLine("$", "playlist: " + selected.length + " videos");
      let ok = 0, fail = 0, count = 0;
      for (const v of selected) {
        count++;
        this.addLine("$", "[" + count + "/" + selected.length + "] iniciando: " + v.title);
        try {
          let r = await fetch("/api/jobs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: v.url, quality: this.quality }),
          });
          if (r.status === 429) {
            this.addLine("›", "limite de velocidad, esperando 20s…");
            await new Promise(resolve => setTimeout(resolve, 20000));
            r = await fetch("/api/jobs", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url: v.url, quality: this.quality }),
            });
          }
          if (!r.ok) throw new Error((await r.json()).detail || "No se pudo crear el job.");
          const { job_id } = await r.json();
          await this.waitJob(job_id, v.title);
          ok++;
        } catch (err) {
          this.addLine("✗", err.message, "err");
          fail++;
        }
      }
      this.addLine(ok > 0 ? "✓" : "✗", "completado: " + ok + " ok, " + fail + " fallidos", ok > 0 ? "ok" : "err");
      this.downloading = false;
    },

    // ── Download ──────────────────────────────
    async updateEngine() {
      if (this.engineUpdating) return;
      this.engineUpdating = true;
      this.engineMsg = "Actualizando motor…";
      try {
        const r = await fetch("/api/engine/update", { method: "POST" });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "No se pudo actualizar.");
        this.engineMsg = d.updated
          ? "Motor actualizado a yt-dlp " + d.version
          : "Ya estabas en la última versión.";
      } catch (err) {
        this.engineMsg = "Error: " + err.message;
      } finally {
        this.engineUpdating = false;
      }
    },

    async download() {
      if (!this.url.trim()) return;
      this.resetUI();
      this.downloading = true;
      this.addLine("$", "yt-dlp -f " + this.quality + " " + this.url.trim());

      let jobId;
      try {
        const r = await fetch("/api/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: this.url.trim(), quality: this.quality }),
        });
        if (!r.ok) throw new Error((await r.json()).detail || "No se pudo crear el job.");
        ({ job_id: jobId } = await r.json());
      } catch (err) {
        this.errorMsg = err.message;
        this.canRetry = true;
        this.downloading = false;
        return;
      }

      const ev = new EventSource("/api/jobs/" + jobId + "/events");
      let lastStatus = "";
      let lastLiveIdx = -1;

      ev.onmessage = (m) => {
        const s = JSON.parse(m.data);
        this.progress = s.percent != null ? s.percent : this.progress;

        if (s.status !== lastStatus) {
          lastStatus = s.status;
          if (s.status === "downloading") this.addLine("›", "descargando streams…");
          if (s.status === "processing") this.addLine("›", s.note || "procesando…");
        }

        if (s.status === "downloading" && s.speed) {
          const txt = (s.percent || 0).toFixed(1) + "%   " +
                      (s.speed || "") + (s.eta ? "   ETA " + s.eta : "");
          if (lastLiveIdx >= 0) {
            this.terminal[lastLiveIdx] = { pfx: "›", text: txt, cls: "", live: true };
            this.terminal = [...this.terminal];
          } else {
            const idx = this.terminal.length;
            this.terminal = [...this.terminal, { pfx: "›", text: txt, cls: "", live: true }];
            lastLiveIdx = idx;
          }
        } else {
          lastLiveIdx = -1;
        }

        if (s.status === "done") {
          this.progress = 100;
          this.progressDone = true;
          this.addLine("✓", "listo → " + s.filename, "ok");
          this.downloadUrl = "/api/jobs/" + jobId + "/file";
          this.downloadFilename = s.filename || "";
          this.successPath = s.filepath || s.filename || "";
          this.lastJobId = jobId;
          this.downloading = false;
          ev.close();
        }
        if (s.status === "error") {
          this.addLine("✗", "error: " + (s.error || "desconocido"), "err");
          this.errorMsg = s.error || "Fallo la descarga.";
          this.canRetry = true;
          this.downloading = false;
          ev.close();
        }
      };

      let retries = 0;
      ev.onerror = () => {
        if (retries < 5 && ev.readyState === EventSource.CONNECTING) {
          retries++;
          return;
        }
        this.addLine("✗", "conexion de eventos cerrada", "err");
        this.downloading = false;
        ev.close();
      };
    },

    async waitJob(jobId, title) {
      return new Promise((resolve) => {
        const ev = new EventSource("/api/jobs/" + jobId + "/events");
        let lastLiveIdx = -1;
        let retries = 0;
        const timeout = setTimeout(() => {
          this.addLine("✗", "timeout: " + title, "err");
          ev.close(); resolve();
        }, 600000);
        ev.onmessage = (m) => {
          const s = JSON.parse(m.data);
          if (s.status === "downloading" && s.speed) {
            const txt = "  " + (s.percent || 0).toFixed(1) + "%  " + (s.speed || "") + (s.eta ? "  ETA " + s.eta : "");
            if (lastLiveIdx >= 0) {
              this.terminal[lastLiveIdx] = { pfx: "›", text: txt, cls: "", live: true };
              this.terminal = [...this.terminal];
            } else {
              const idx = this.terminal.length;
              this.terminal = [...this.terminal, { pfx: "›", text: txt, cls: "", live: true }];
              lastLiveIdx = idx;
            }
          }
          if (s.status === "done") { clearTimeout(timeout); this.addLine("✓", "ok: " + title, "ok"); ev.close(); resolve(); }
          if (s.status === "error") { clearTimeout(timeout); this.addLine("✗", "error: " + (s.error || "desconocido"), "err"); ev.close(); resolve(); }
        };
        ev.onerror = () => {
          if (retries < 3 && ev.readyState === EventSource.CONNECTING) { retries++; return; }
          clearTimeout(timeout); ev.close(); resolve();
        };
      });
    },

    // ── UI helpers ────────────────────────────
    addLine(pfx, text, cls = "") {
      this.terminal = [...this.terminal, { pfx, text, cls }];
    },

    resetUI() {
      this.terminal = [];
      this.progress = 0;
      this.progressDone = false;
      this.downloadUrl = "";
      this.downloadFilename = "";
      this.successPath = "";
      this.lastJobId = "";
      this.errorMsg = "";
      this.canRetry = false;
      this.isPlaylist = false;
      this.playlistVideos = [];
      this.formats = [];
      this.showFormats = false;
    },

    async openFolder(jobId) {
      if (!jobId) return;
      await fetch("/api/jobs/" + jobId + "/open-folder", { method: "POST" });
    },

    // ── History ───────────────────────────────
    async toggleHistory() {
      this.historyOpen = !this.historyOpen;
      if (this.historyOpen && !this.historyLoaded) {
        try {
          const r = await fetch("/api/history?limit=15");
          this.history = await r.json();
        } catch (e) {
          this.history = [];
        }
        this.historyLoaded = true;
      }
    },

    // ── Duration formatter ────────────────────
    fmtDuration(secs) {
      if (!secs) return "";
      const d = new Date(secs * 1000).toISOString();
      return d.substring(11, 19).replace(/^00:/, "");
    },
  }));
});
</script>
</body>
</html>
