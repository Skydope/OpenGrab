<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenGrab</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png?v=__VERSION__">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png?v=__VERSION__">
<link rel="shortcut icon" href="/static/favicon.ico?v=__VERSION__">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=__VERSION__">
<link rel="manifest" href="/static/site.webmanifest?v=__VERSION__">
<link rel="stylesheet" href="/static/style.css?v=__VERSION__">
<script src="/static/alpine.min.js?v=__VERSION__" defer></script>
</head>
<body>
<div class="wrap" x-data="app" x-init="init()">

  <header> 
    <a href="/">
    <img src="/static/logo.png" alt="Logo"></a>
    <span class="logo">Open<b>Grab</b></span>
    <span class="tag"><span class="dot"></span>self-hosted · yt-dlp</span>
    <span class="header-actions">
      <button class="theme-btn" @click="toggleTheme" :aria-label="theme==='dark'?t('theme.light'):t('theme.dark')">
        <svg x-show="theme==='dark'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"></path>
        </svg>
        <svg x-show="theme!=='dark'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" x-cloak>
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
        </svg>
      </button>
      <button class="theme-btn" @click="openSettingsModal()" :title="t('ui.settings_title')" :aria-label="t('ui.settings_title')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </span>
  </header>

  <!-- Auth card -->
  <div class="card auth-card" x-show="authChecked && !authenticated" x-cloak>
    <label class="fld" for="token" x-text="t('ui.token_label')"></label>
    <div class="row">
      <input id="token" type="password" :placeholder="t('ui.token_placeholder')"
             autocomplete="off" spellcheck="false" x-model="token"
             @keydown.enter="doAuth">
      <button class="go" @click="doAuth" :disabled="authLoading" x-text="t('ui.connect')">
        <span x-show="authLoading">…</span>
      </button>
    </div>
  </div>

  <!-- Main card -->
  <div class="card" x-show="authChecked && authenticated" x-cloak>
    <label class="fld" for="url" x-text="t('ui.url_label')"></label>
    <div class="row url-row" @drop.prevent="onDrop($event)" @dragover.prevent>
      <span class="url-input-wrap">
        <input id="url" type="text" placeholder="https://…"
               autocomplete="off" spellcheck="false" x-model="url"
               @keydown.enter="inspect" @paste="onPaste($event)">
        <button class="url-clear" x-show="url" @click="clearUrl()"
                :aria-label="t('ui.clear_url')" :title="t('ui.clear')" x-cloak>✕</button>
      </span>
      <button class="copy-btn" @click="copyCommand" :disabled="!url"
              :class="{copied: cmdCopied}" x-text="cmdCopied ? '✓' : '📋'"
              :title="t('ui.copy_command')"></button>
      <button class="paste-btn" @click="pasteFromClipboard"
              :title="t('ui.paste_hint')" x-text="t('ui.paste')"></button>
      <button class="btn-secondary analyze-btn" @click="inspect" :disabled="inspecting">
        <span x-show="!inspecting" x-text="t('ui.analyze')"></span>
        <span x-show="inspecting">…</span>
      </button>
    </div>
    <p class="url-hint muted-sm" x-show="!meta && !inspecting && !isPlaylist && !downloading && !terminal.length" x-cloak
       x-text="t('ui.url_placeholder')"></p>

    <!-- Video metadata -->
    <div class="meta" x-show="inspecting && !meta" x-transition.duration.200ms>
      <div class="skeleton skeleton-thumb"></div>
      <div class="info" style="flex:1">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line short"></div>
      </div>
    </div>
    <div class="meta" x-show="meta" x-transition.duration.200ms>
      <img class="thumb" :src="thumbnail" alt="">
      <div class="info">
        <p class="t" x-text="title">—</p>
        <p class="s" x-text="subtitle">—</p>
        <span class="site-badge" x-show="site" x-text="t('ui.site_detected') + ' ' + site"></span>
        <button class="btn-sm mt-14" x-show="playlistAvailable"
                @click="isPlaylist = true; loadPlaylist()">
          <span x-text="t('ui.view_playlist')"></span>
        </button>
      </div>
    </div>

    <!-- Quality chips -->
    <div class="quality">
      <template x-for="q in qualities" :key="q.id">
        <span class="chip" :data-q="q.id"
              :aria-pressed="quality === q.id" role="radio" tabindex="0"
              @click="quality = q.id"
              @keydown.enter.prevent="quality = q.id"
              @keydown.space.prevent="quality = q.id"
              x-text="t('quality.'+q.id)"></span>
      </template>
    </div>

    <!-- Extras toggles (subs, thumb, info json) -->
    <div class="extras-toggles" x-show="!isPlaylist && !downloading">
      <label class="extra-toggle">
        <input type="checkbox" x-model="subsEnabled" @change="saveExtraPref('subs')">
        <span x-text="t('ui.subs_toggle')"></span>
      </label>
      <label class="extra-toggle">
        <input type="checkbox" x-model="thumbEnabled" @change="saveExtraPref('thumb')">
        <span x-text="t('ui.thumb_toggle')"></span>
      </label>
      <label class="extra-toggle">
        <input type="checkbox" x-model="infojsonEnabled" @change="saveExtraPref('infojson')">
        <span x-text="t('ui.infojson_toggle')"></span>
      </label>
    </div>

    <!-- Format preview -->
    <div x-show="formats.length" class="mt-14 fmt-wrap">
      <div class="toggle-label"
           role="button" tabindex="0" :aria-expanded="showFormats"
           @click="showFormats = !showFormats"
           @keydown.enter.prevent="showFormats = !showFormats"
           @keydown.space.prevent="showFormats = !showFormats"
           x-text="showFormats ? t('ui.formats_expanded') : t('ui.formats_collapsed') + ' (' + formats.length + ')'"></div>
      <table class="fmt-table" x-show="showFormats" x-transition.duration.200ms>
        <thead><tr><th x-text="t('shortcuts.calidad')"></th><th x-text="t('shortcuts.codec')"></th><th class="fsize" x-text="t('shortcuts.size')"></th></tr></thead>
        <tbody>
          <template x-for="f in formats" :key="f.format_id">
            <tr role="button" tabindex="0"
                @click="quality = f.format_id"
                @keydown.enter.prevent="quality = f.format_id"
                @keydown.space.prevent="quality = f.format_id"
                :class="{sel: quality === f.format_id}">
              <td x-text="f.format_note || f.resolution || f.format_id"></td>
              <td x-text="(f.vcodec||'?') + ' / ' + (f.acodec||'?')"></td>
              <td class="fsize" x-text="f.filesize ? (f.filesize/1048576).toFixed(1)+' MB' : '—'"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Playlist panel -->
    <div x-show="isPlaylist" x-transition.duration.200ms class="mt-14">
      <div class="pl-header">
        <span class="pl-count" x-text="selectedCount() + '/' + playlistCount + ' ' + t('ui.seleccionados')"></span>
        <button class="btn-sm" @click="toggleAllPlaylist(true)" x-text="t('ui.all')"></button>
        <button class="btn-sm" @click="toggleAllPlaylist(false)" x-text="t('ui.none')"></button>
        <button class="btn-sm" @click="downloadPlaylist" :disabled="selectedCount() === 0" x-text="t('ui.download_playlist')"></button>
      </div>
      <div class="pl-list">
        <template x-for="(v, i) in playlistVideos" :key="v.url || v.video_id || i">
          <div class="pl-video">
            <input type="checkbox" x-model="v.selected" :disabled="v.unavailable">
            <span class="pl-title" :title="v.title" x-text="v.title"></span>
            <span class="pl-dur" x-text="v.duration ? fmtDuration(v.duration) : ''"></span>
          </div>
        </template>
        <span x-show="playlistLoading" class="loading-msg">
          <template x-for="i in 4" :key="i">
            <div class="skeleton-pl"><div class="skeleton skeleton-line"></div></div>
          </template>
        </span>
      </div>
    </div>

    <!-- Batch progress display -->
    <div x-show="batchJobIds.length > 0" x-transition.duration.200ms class="batch-progress">
      <div class="batch-header">
        <span class="batch-title" x-text="t('ui.batch_section')"></span>
        <span class="batch-count" x-text="Object.keys(batchJobs).length + ' / ' + batchJobIds.length"></span>
      </div>
      <div class="batch-grid">
        <template x-for="jobId in batchJobIds" :key="jobId">
          <div class="batch-row" :class="'status-' + (batchJobs[jobId]?.status || 'queued')">
            <span class="batch-status-icon" x-text="{
              'queued': '⏳',
              'starting': '⏳',
              'downloading': '↓',
              'processing': '⚙',
              'done': '✓',
              'error': '✗',
              'interrupted': '⚠'
            }[batchJobs[jobId]?.status || 'queued']"></span>
            <span class="batch-title-cell" x-text="batchJobs[jobId]?.title || jobId" :title="batchJobs[jobId]?.filename || ''"></span>
            <div class="batch-progress-bar" x-show="batchJobs[jobId]?.status === 'downloading' || batchJobs[jobId]?.status === 'processing'">
              <i :style="'width:' + (batchJobs[jobId]?.percent || 0) + '%'"></i>
            </div>
            <span class="batch-pct" x-text="(batchJobs[jobId]?.percent || 0).toFixed(0) + '%'" x-show="batchJobs[jobId]?.status === 'downloading' || batchJobs[jobId]?.status === 'processing'"></span>
            <span class="batch-speed" x-text="batchJobs[jobId]?.speed || ''" x-show="batchJobs[jobId]?.speed"></span>
            <span class="batch-eta" x-text="batchJobs[jobId]?.eta || ''" x-show="batchJobs[jobId]?.eta"></span>
            <span class="batch-error" x-show="batchJobs[jobId]?.status === 'error'" x-text="batchJobs[jobId]?.error || t('ui.error')"></span>
          </div>
        </template>
      </div>
    </div>

    <div class="mt-18" x-show="!batchJobIds.length">
      <button @click="isPlaylist ? downloadPlaylist() : download()" :disabled="isPlaylist ? selectedCount() === 0 : !url.trim()" class="btn-block" x-text="t('ui.download')"></button>
    </div>

    <!-- Progreso de descarga -->
    <div class="term" :class="{show: terminal.length > 0 && !batchJobIds.length}">
      <div class="bar-head">
        <span class="tl"><i></i><i></i><i></i></span>
        <span>yt-dlp</span>
        <button class="term-toggle" @click="showTerminal = !showTerminal"
                x-text="showTerminal ? t('ui.hide_log') : t('ui.show_log')"></button>
      </div>
      <!-- Lectura limpia: % grande + velocidad · ETA -->
      <div class="dl-stats">
        <span class="dl-pct" :class="{done: progressDone}"
              x-text="(progressDone ? 100 : Math.round(progress)) + '%'"></span>
        <span class="dl-meta" x-show="downloading && (dlSpeed || dlEta)">
          <span x-show="dlSpeed" x-text="dlSpeed"></span>
          <span x-show="dlEta" x-text="'· ETA ' + dlEta"></span>
        </span>
        <span class="dl-meta dl-done" x-show="progressDone">listo</span>
      </div>
      <div class="progress" :class="{done: progressDone}">
        <i :style="'width:' + progress + '%'"></i>
      </div>
      <div class="lines" x-show="showTerminal" x-ref="lines"
           x-effect="if($refs.lines && terminal.length) $refs.lines.scrollTop = $refs.lines.scrollHeight">
        <template x-for="(line, idx) in terminal" :key="idx">
          <p class="l" :class="line.cls">
            <span class="pfx" x-text="line.pfx"></span>
            <span class="body" x-text="line.text"></span>
          </p>
        </template>
      </div>
    </div>

    <!-- Descargas de esta sesión (concurrentes + rehidratadas) -->
    <div class="batch-progress" x-show="!batchJobIds.length && Object.keys(sessionJobs).length"
         x-transition.duration.200ms style="margin-top:14px">
      <div class="batch-header">
        <span class="batch-title" x-text="t('ui.sessions_active')"></span>
        <span class="batch-count" x-text="sessionActiveCount + ' activa(s) · ' + Object.keys(sessionJobs).length + ' total'"></span>
      </div>
      <template x-for="j in sortedSessionJobs" :key="j.id">
        <div class="batch-row" :class="['status-' + (j.status || 'queued'), {focused: j.id === focusedJobId}]"
             @click="focusJob(j.id)" style="cursor:pointer">
          <span class="batch-status-icon" x-text="{
            queued:'•', starting:'•', downloading:'↓', processing:'⚙', done:'✓', error:'✗', cancelled:'∅'
          }[j.status] || '•'"></span>
          <span class="batch-title-cell" x-text="j.title || j.filename || j.id" :title="j.filename || ''"></span>
          <div class="batch-progress-bar" x-show="j.status === 'downloading' || j.status === 'processing'">
            <i :style="'width:' + (j.percent || 0) + '%'"></i>
          </div>
          <span class="batch-pct" x-text="(j.percent || 0).toFixed(0) + '%'"
                x-show="j.status === 'downloading' || j.status === 'processing'"></span>
          <span class="batch-speed" x-text="j.speed || ''" x-show="j.speed && j.status === 'downloading'"></span>
          <span class="batch-eta" x-text="j.eta || ''" x-show="j.eta && j.status === 'downloading'"></span>
          <span class="batch-error" x-show="j.status === 'error'" x-text="j.error || t('ui.error')"></span>
          <span class="batch-error" x-show="j.status === 'cancelled'">cancelado</span>
          <span class="job-actions">
            <a class="job-act" x-show="j.status === 'done'" :href="'/api/jobs/' + j.id + '/file'"
               :download="j.filename || ''" @click.stop :title="t('ui.save_file')">⬇</a>
            <button class="job-act job-cancel"
                    x-show="['queued','starting','downloading','processing'].includes(j.status)"
                     @click.stop="cancelJob(j.id)" :title="t('ui.cancel')">✕</button>
            <button class="job-act"
                    x-show="j.status === 'done' || j.status === 'error' || j.status === 'cancelled'"
                     @click.stop="dismissJob(j.id)" :title="t('ui.discard')">✕</button>
          </span>
        </div>
      </template>
    </div>

    <!-- Error -->
    <div class="err-box" :class="{show: errorMsg}">
      <span x-text="errorMsg"></span>
      <button class="btn-sm retry-btn" x-show="canRetry" @click="download"
              :aria-label="t('ui.retry_download')" x-text="t('ui.retry')"></button>
    </div>

    <!-- Download / Save link -->
    <div class="actions" :class="{show: downloadUrl}">
      <template x-if="isDesktop">
        <button class="dl" @click="saveTo(lastJobId)" :disabled="savingTo"
                :aria-label="t('ui.save_to_folder')">
          <span x-show="!savingTo" x-text="t('ui.save_as')"></span>
          <span x-show="savingTo" x-cloak x-text="t('ui.saving')"></span>
        </button>
      </template>
      <template x-if="!isDesktop">
        <a class="dl" :href="downloadUrl" :download="downloadFilename" x-text="t('ui.save_file')"></a>
      </template>
    </div>

    <!-- Success banner -->
    <div class="success-box" :class="{show: successPath}" x-transition.duration.200ms>
      <span class="success-icon">✓</span>
      <span class="success-path" x-text="successPath"></span>
      <button class="folder-btn" @click="openFolder(lastJobId)" :disabled="!lastJobId"
              x-text="t('ui.open_folder')"></button>
    </div>
  </div>

  <footer>
    <span x-text="t('ui.footer')"></span>
  </footer>

  <!-- Tools section divider -->
  <div class="section-divider" x-show="authenticated" x-cloak>
    <span class="section-label" x-text="t('ui.tools')"></span>
  </div>

  <!-- History -->
  <div class="tools-section" x-show="authenticated" x-cloak>
    <div class="toggle-label-lg"
         role="button" tabindex="0" :aria-expanded="historyOpen"
         @click="toggleHistory"
         @keydown.enter.prevent="toggleHistory"
         @keydown.space.prevent="toggleHistory"
                    x-text="historyOpen ? t('ui.history_expanded') : t('ui.history_collapsed') + historyBadge()"></div>
    <div x-show="historyOpen">
      <input type="text" x-model="historyFilter" 
             :placeholder="t('ui.history_filter_placeholder')"
             class="hist-filter" x-show="history.length > 5">
      <span x-show="!historyLoaded" class="muted-sm" x-text="t('ui.loading')"></span>
      <span x-show="historyLoaded && !history.length" class="empty-state" x-text="t('ui.no_downloads')"></span>
      <span x-show="historyLoaded && history.length && !visibleHistory.length && historyFilter" class="empty-state" x-text="t('ui.history_no_results')"></span>
      <template x-for="e in visibleHistory" :key="e.job_id">
        <div class="h-entry" :data-job-id="e.job_id">
          <img class="h-thumb" x-show="e.thumbnail" :src="e.thumbnail" alt="" loading="lazy">
          <span class="h-title" :title="e.title" x-text="e.title"></span>
          <span class="h-meta" x-text="e.quality"></span>
          <span class="h-size" x-show="e.size" x-text="(e.size/1048576).toFixed(1) + ' MB'"></span>
          <button class="h-del" @click.stop="deleteHistoryEntry(e.job_id)" :title="t('ui.delete')">×</button>
        </div>
      </template>
      <div class="engine-row">
        <button class="btn-sm" @click="clearAllHistory" x-show="history.length" x-text="t('ui.clear_history')"></button>
        <button class="btn-sm" @click="updateEngine" :disabled="engineUpdating"
                :aria-label="t('ui.update_engine_aria')"
                x-text="engineUpdating ? t('ui.updating_engine') : t('ui.update_engine')"></button>
        <span class="muted-sm" x-show="engineMsg" x-text="engineMsg" aria-live="polite"></span>
      </div>
    </div>
  </div>

  <!-- Storage -->
  <div class="tools-section" x-show="authenticated" x-cloak>
    <div class="toggle-label-lg"
         role="button" tabindex="0" :aria-expanded="storageOpen"
         @click="toggleStorage"
         @keydown.enter.prevent="toggleStorage"
         @keydown.space.prevent="toggleStorage"
                    x-text="storageOpen ? t('ui.storage_expanded') : t('ui.storage_collapsed') + storageBadge()"></div>
    <div x-show="storageOpen">
      <span x-show="!storageLoaded" class="muted-sm" x-text="t('ui.loading')"></span>
      <div x-show="storageLoaded">
        <div class="storage-summary">
          <span x-text="t('ui.total_used') + ' ' + formatMB(storage.total_usage_bytes)"></span>
          <span class="muted-sm" x-show="storage.db_size_bytes" x-text="' · DB: ' + formatMB(storage.db_size_bytes)"></span>
        </div>
        <div x-show="storageLoaded && !storage.workdirs.length && !(storage.loose_files && storage.loose_files.length)"
             class="empty-state"><span class="success-icon">✓</span> <span x-text="t('ui.clean_storage')"></span></div>
        <template x-if="storage.workdirs.length">
          <div>
            <div class="muted-sm" style="margin:8px 0 4px" x-text="t('ui.temp_workdirs')"></div>
            <template x-for="w in storage.workdirs" :key="w.name">
              <div class="wd-entry">
                <span class="wd-name" x-text="w.name"></span>
                <span class="wd-badge" x-show="w.active" x-text="t('ui.active_badge')"></span>
                <span class="h-meta" x-text="formatMB(w.size_bytes)"></span>
                <span class="h-meta" x-text="formatAge(w.age_hours)"></span>
              </div>
            </template>
          </div>
        </template>
        <template x-if="storage.loose_files && storage.loose_files.length">
          <div>
            <div class="muted-sm" style="margin:8px 0 4px" x-text="t('ui.loose_files')"></div>
            <template x-for="f in storage.loose_files" :key="f.name">
              <div class="wd-entry">
                <span class="wd-name" x-text="f.name"></span>
                <span class="h-meta" x-text="formatMB(f.size_bytes)"></span>
                <span class="h-meta" x-text="formatAge(f.age_hours)"></span>
              </div>
            </template>
          </div>
        </template>
        <div class="engine-row">
          <button class="btn-sm" @click="cleanupStorage" x-text="t('ui.cleanup_old')"></button>
          <button class="btn-sm" @click="cleanupAllStorage" x-text="t('ui.cleanup_all')"></button>
          <span class="muted-sm" x-show="storageMsg" x-text="storageMsg" aria-live="polite"></span>
    </div>

    <!-- Extras files (subs, thumb, info json) -->
    <div x-show="focusedJobId && jobExtras[focusedJobId]?.length" class="job-extras">
      <span class="extras-label" x-text="t('ui.extras') + ':'"></span>
      <template x-for="ex in jobExtras[focusedJobId]" :key="ex.filename">
        <a :href="'/api/jobs/' + focusedJobId + '/file/' + ex.filename" class="extra-link"
           :download="ex.filename" x-text="ex.filename + ' (' + fmtSize(ex.size) + ')'"></a>
      </template>
    </div>
  </div>
    </div>
  </div>

  <!-- Channels (watch mode) -->
  <div class="tools-section" x-show="authenticated" x-cloak>
    <div class="toggle-label-lg"
         role="button" tabindex="0" :aria-expanded="channelsOpen"
         @click="toggleChannels"
         @keydown.enter.prevent="toggleChannels"
         @keydown.space.prevent="toggleChannels"
                    x-text="channelsOpen ? t('ui.channels_expanded') : t('ui.channels_collapsed') + channelsBadge()"></div>
    <div x-show="channelsOpen">
      <span x-show="!channelsLoaded" class="muted-sm" x-text="t('ui.loading')"></span>

      <template x-for="ch in channels" :key="ch.id">
        <div class="ch-entry">
          <span class="ch-title" :title="ch.url" x-text="ch.title || ch.url"></span>
          <span class="ch-meta" x-text="ch.quality"></span>
          <span class="ch-meta" x-text="'cada ' + ch.interval_minutes + 'm'"></span>
          <button class="btn-sm" @click="checkChannel(ch.id)" :disabled="ch._checking"
                  x-text="ch._checking ? '…' : t('ui.check_channel')"></button>
          <button class="btn-sm" :class="{toggled: ch.enabled}"
                  @click="toggleChannel(ch)"
                  x-text="ch.enabled ? t('ui.on') : t('ui.off')"></button>
          <button class="btn-sm" @click="deleteChannel(ch.id)">✕</button>
        </div>
      </template>
      <span x-show="channelsLoaded && !channels.length" class="empty-state" x-text="t('ui.no_channels')"></span>

      <div class="ch-add">
        <input type="text" :placeholder="t('ui.url_channel_placeholder')" x-model="newChannelUrl"
               @keydown.enter="addChannel">
        <select x-model="newChannelQuality">
          <option value="best">best</option>
          <option value="1080p">1080p</option>
          <option value="720p">720p</option>
          <option value="480p">480p</option>
          <option value="audio">audio</option>
        </select>
        <input type="number" x-model="newChannelInterval" min="5" max="1440" style="width:60px"
               :title="t('ui.interval_minutes_title')">
        <button class="btn-sm" @click="addChannel" :disabled="!newChannelUrl" x-text="t('ui.add_channel')"></button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="settings-overlay" x-show="settingsModalOpen" x-cloak
       @keydown.escape.window="closeSettingsModal()" x-transition.opacity>
    <div class="settings-backdrop" @click="closeSettingsModal()"></div>
    <div class="settings-modal" role="dialog" aria-modal="true"
         :aria-label="t('ui.settings_title')" @click.stop
         x-transition:enter="sm-enter" x-transition:enter-start="sm-enter-start">
      <!-- Header -->
      <div class="sm-head">
        <div class="sm-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span x-text="t('ui.settings_title')"></span>
        </div>
        <button class="sm-close" @click="closeSettingsModal()"
                :aria-label="t('ui.close')" :title="t('ui.press_esc')">&#10005;</button>
      </div>

      <!-- Tabs -->
      <div class="sm-tabs" role="tablist">
        <template x-for="tab in settingsTabs" :key="tab.id">
          <button class="sm-tab" role="tab" :class="{active: activeTab === tab.id}"
                  :aria-selected="activeTab === tab.id" @click="activeTab = tab.id">
            <span x-text="t(tab.label)"></span>
          </button>
        </template>
      </div>

      <!-- Body -->
      <div class="sm-body">
        <div x-show="settingsLoading" aria-busy="true">
          <div class="skeleton" style="height:52px;margin:12px 0;"></div>
          <div class="skeleton" style="height:52px;margin:12px 0;"></div>
          <div class="skeleton" style="height:52px;margin:12px 0;"></div>
        </div>

        <!-- Grouped panels (downloads / storage / interface) -->
        <template x-for="tab in settingsTabs.filter(tt => tt.id !== 'advanced')" :key="'p-'+tab.id">
          <div class="sm-panel" role="tabpanel"
               x-show="!settingsLoading && activeTab === tab.id">
            <template x-for="s in settingsByGroup(tab.id)" :key="s.key">
              <div class="sm-field" x-show="s.scope !== 'desktop' || isDesktop"
                   :class="{ 'sm-field-err': s._error }">
                <div class="sm-field-info">
                  <span class="sm-field-label" x-text="t(s.description || s.key)"></span>
                  <span x-show="s.tokens && s.key==='name_template'" class="sm-field-help">
                    <span x-text="t('ui.tokens_label')"></span>: <template x-for="tok in s.tokens"><code class="set-token" x-text="tok"></code></template>
                  </span>
                </div>
                <div class="sm-field-control">
                  <span class="set-origin" x-show="s.locked"
                        :title="t('ui.settings_lock_note')">&#128274;</span>

                  <select x-show="!s.locked && (s.scope !== 'desktop' || isDesktop) && s.options"
                          x-model="s._editValue" @change="saveSetting(s)">
                    <template x-for="opt in s.options" :key="opt.value">
                      <option :value="opt.value" x-text="t(opt.label)"></option>
                    </template>
                  </select>

                  <input x-show="!s.locked && (s.scope !== 'desktop' || isDesktop) && s.type==='int'"
                         type="number" x-model="s._editValue"
                         :min="s.validation?.min" :max="s.validation?.max"
                         @keydown.enter="validateAndSave(s)" @blur="validateAndSave(s)">

                  <label x-show="!s.locked && (s.scope !== 'desktop' || isDesktop) && s.type==='bool'"
                         class="set-toggle">
                    <input type="checkbox"
                           :checked="s._editValue === true || s._editValue === 'true'"
                           @change="s._editValue = $event.target.checked; saveSetting(s)">
                    <span class="set-toggle-label"
                          x-text="(s._editValue === true || s._editValue === 'true') ? t('ui.on') : t('ui.off')"></span>
                  </label>

                  <input x-show="!s.locked && (s.scope !== 'desktop' || isDesktop) && s.type==='string' && !s.options"
                         type="text" x-model="s._editValue" :placeholder="s.placeholder"
                         @keydown.enter="validateAndSave(s)">

                  <span x-show="s.locked || (s.scope === 'desktop' && !isDesktop)"
                        class="set-value" x-text="s.value"></span>

                  <button x-show="!s.locked && (s.scope !== 'desktop' || isDesktop) && !s.options && s.type!=='bool'"
                          class="btn-sm" @click="validateAndSave(s)" :disabled="s._saving"
                          x-text="s._saving ? t('ui.saving') : t('ui.save')"></button>

                  <span x-show="s._saving" class="set-spin" :aria-label="t('ui.saving')"></span>
                </div>
                <div x-show="s._error" class="set-err" x-text="s._error"></div>
              </div>
            </template>
            <div class="sm-empty"
                 x-show="settingsByGroup(tab.id).filter(s => s.scope !== 'desktop' || isDesktop).length === 0"
                 x-text="t('ui.settings_empty_group')"></div>
          </div>
        </template>

        <!-- Advanced panel -->
        <div class="sm-panel" role="tabpanel" x-show="!settingsLoading && activeTab === 'advanced'">
          <div class="sm-adv-block">
            <div class="sm-adv-title" x-text="t('ui.backup_title')"></div>
            <div class="sm-adv-desc muted-sm" x-text="t('ui.backup_desc')"></div>
            <div class="backup-actions">
              <button class="btn-sm" @click="exportBackup" x-text="t('ui.export_backup')"></button>
              <button class="btn-sm" @click="importBackup" x-text="t('ui.import_backup')"></button>
              <input type="file" id="backup-file" accept=".json" @change="handleBackupFile($event)" style="display:none">
            </div>
          </div>
          <div class="sm-adv-note muted-sm" x-show="settings.some(s => s.locked)"
               x-text="t('ui.settings_lock_note')"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" :class="{show: toast.show, success: toast.type === 'success'}">
    <span x-text="toast.message"></span>
    <button @click="undoDelete" x-show="toast.type === 'pending'" x-text="t('ui.undo')"></button>
    <button @click="acceptDeletes" x-show="toast.type === 'pending'" x-text="t('ui.accept')"></button>
    <button @click="dismissToast" x-show="toast.type === 'success'" class="toast-close">✕</button>
  </div>

</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('app', () => ({
    // ── Auth ──────────────────────────────────
    AUTH_REQUIRED: "__AUTH_REQUIRED__" === "true",
    FORMATS: __FORMATS_JSON__,
    token: "",
    authLoading: false,
    authenticated: false,
    authChecked: false,

    // ── Theme ─────────────────────────────────
    theme: "dark",

    initTheme() {
      const saved = localStorage.getItem("opengrab-theme");
      if (saved) {
        this.theme = saved;
      } else {
        this.theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      this.applyTheme();
    },
    toggleTheme() {
      this.theme = this.theme === "dark" ? "light" : "dark";
      localStorage.setItem("opengrab-theme", this.theme);
      this.applyTheme();
    },
    applyTheme() {
      document.documentElement.setAttribute("data-theme", this.theme);
    },

    // ── i18n ─────────────────────────────────
    i18n: {},
    lang: "es",

    async loadI18n(lang) {
      try {
        const r = await fetch(`/static/i18n/${lang}.json`);
        if (r.ok) {
          this.i18n = await r.json();
          this.lang = lang;
        } else if (lang !== "en") {
          await this.loadI18n("en");
        }
      } catch (e) {
        if (lang !== "en") await this.loadI18n("en");
      }
      document.documentElement.lang = this.lang;
      document.cookie = `opengrab_lang=${this.lang};path=/;SameSite=Lax`;
    },
    t(key, ...args) {
      let text = this.i18n[key];
      if (text === undefined) return key;
      if (args.length === 1 && typeof args[0] === 'object' && args[0] !== null) {
        const obj = args[0];
        for (const [k, v] of Object.entries(obj)) {
          text = text.replace(new RegExp(`\\{${k}\\}`, 'g'), String(v));
        }
      } else {
        args.forEach((a, i) => {
          text = text.replace(new RegExp(`\\{${i}\\}`, 'g'), String(a));
        });
      }
      return text;
    },
    async reloadI18n(lang) {
      await this.loadI18n(lang);
      this.i18n = { ...this.i18n };  // trigger reactivity
    },

    // ── Watch Notifications ──────────────────
    _notifPerm: "default",
    _watchPollTimer: null,
    _lastKnownVideoCount: 0,

    async requestNotifPermission() {
      if (!("Notification" in window)) return "unsupported";
      if (Notification.permission === "granted") return "granted";
      const perm = await Notification.requestPermission();
      this._notifPerm = perm;
      return perm;
    },
    notify(title, body) {
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted") return;
      new Notification(title, {
        body: body,
        icon: "/static/icon-192.png",
        tag: "opengrab-watch",
      });
    },
    startWatchPoll() {
      if (this._watchPollTimer) return;
      this._watchPollTimer = setInterval(() => { this.pollWatch(); }, 60000);
      this.pollWatch();  // primera consulta inmediata para inicializar el contador
    },
    stopWatchPoll() {
      if (this._watchPollTimer) {
        clearInterval(this._watchPollTimer);
        this._watchPollTimer = null;
      }
    },
    async pollWatch() {
      try {
        const r = await fetch("/api/channels");
        if (!r.ok) return;
        const channels = await r.json();
        let totalChecked = 0;
        for (const ch of channels) {
          if (ch.last_checked) {
            const ageSec = (Date.now() / 1000) - ch.last_checked;
            if (ageSec < 120) totalChecked++;
          }
        }
        if (this._lastKnownVideoCount > 0 && totalChecked > this._lastKnownVideoCount) {
          const newVideos = totalChecked - this._lastKnownVideoCount;
          this.notify("OpenGrab", this.t("ui.videos_found", {count: newVideos}));
        }
        this._lastKnownVideoCount = totalChecked;
      } catch (e) { /* silencioso: el poller no debe romper nada */ }
    },

    async init() {
      this.initTheme();
      await this.loadI18n(navigator.language.startsWith('en') ? 'en' : 'es');
      if (!this.AUTH_REQUIRED) {
        this.authenticated = true; this.authChecked = true;
        await this.rehydrate();
        await this.fetchDefaults();
        return;
      }
      try {
        const r = await fetch("/api/history?limit=1");
        this.authenticated = r.status !== 401;
      } catch (e) {
        this.authenticated = false;
      }
      this.authChecked = true;
      if (this.authenticated) {
        await this.rehydrate();
        await this.fetchDefaults();
      }
    },

    async doAuth() {
      if (!this.token.trim()) return;
      this.authLoading = true;
      const r = await fetch("/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: this.token.trim() }),
      });
      if (r.ok) {
        this.authenticated = true;
        await this.rehydrate();
        await this.fetchDefaults();
      } else {
        this.errorMsg = this.t('error.token_invalid');
      }
      this.authLoading = false;
    },

    // ── Quality ───────────────────────────────
    quality: "best",
    subsEnabled: false,
    thumbEnabled: false,
    infojsonEnabled: false,
    qualities: [
      { id: "best",  label: "best mp4" },
      { id: "1080p", label: "1080p" },
      { id: "720p",  label: "720p" },
      { id: "480p",  label: "480p" },
      { id: "audio", label: "solo audio · mp3" },
    ],
    formats: [],
    showFormats: false,

    // ── Engine (yt-dlp hot-swap) ──────────────
    engineUpdating: false,
    engineMsg: "",

    // ── URL / inspect ─────────────────────────
    url: "",
    inspecting: false,
    meta: false,
    thumbnail: "",
    site: "",
    title: "—",
    subtitle: "—",
    cmdCopied: false,

    // ── Playlist ──────────────────────────────
    isPlaylist: false,
    playlistAvailable: false,
    playlistCount: 0,
    playlistVideos: [],
    playlistLoading: false,

    // ── Download ──────────────────────────────
    downloading: false,
    terminal: [],
    dlSpeed: "",
    dlEta: "",
    showTerminal: false,
    progress: 0,
    progressDone: false,
    downloadUrl: "",
    downloadFilename: "",
    successPath: "",
    lastJobId: "",
    savingTo: false,
    lastSaveDir: "",

    // ── Sesión: descargas concurrentes (tarjetas) ──
    sessionJobs: {},     // {id: {id,status,percent,speed,eta,note,title,filename,filepath,error,created,finished,lines}}
    focusedJobId: "",    // job cuyo detalle se ve en la terminal
    jobExtras: {},       // {jobId: [{filename, type, size}, ...]}
    _streams: {},        // {id: EventSource} para no duplicar conexiones

    // ── Error ─────────────────────────────────
    errorMsg: "",
    canRetry: false,

    // ── History ───────────────────────────────
    historyOpen: false,
    historyLoaded: false,
    history: [],
    historyFilter: "",
    pendingDeletes: {},      // { jobId: { timeoutId, entry } }
    _clearAllPending: null,  // { timeoutId, history }
    toast: { show: false, message: "", type: null },  // 'pending' | 'success'

    // ── Storage ───────────────────────────────
    storageOpen: false,
    storageLoaded: false,
    storage: { total_usage_bytes: 0, workdirs: [], loose_files: [], db_size_bytes: 0 },
    storageMsg: "",

    // ── Channels ──────────────────────────────
    channelsOpen: false,
    channelsLoaded: false,
    channels: [],
    newChannelUrl: "",
    newChannelQuality: "best",
    newChannelInterval: 60,

    // ── Settings ──────────────────────────────
    isDesktop: "__IS_DESKTOP__" === "true",
    settingsModalOpen: false,
    settingsLoaded: false,
    settingsLoading: false,
    settings: [],
    activeTab: "downloads",
    settingsTabs: [
      { id: "downloads", label: "ui.tab_downloads" },
      { id: "storage", label: "ui.tab_storage" },
      { id: "interface", label: "ui.tab_interface" },
      { id: "advanced", label: "ui.tab_advanced" },
    ],

    async loadSettings() {
      if (this.settingsLoaded) return;
      this.settingsLoading = true;
      const r = await fetch("/api/settings");
      if (r.ok) {
        const data = await r.json();
        this.settings = data.map(s => ({ ...s, _editValue: s.value, _error: null, _saving: false }));
        this.settingsLoaded = true;
      }
      this.settingsLoading = false;
    },
    async openSettingsModal() {
      this.activeTab = "downloads";
      this.settingsModalOpen = true;
      document.body.classList.add("modal-open");
      await this.loadSettings();
    },
    closeSettingsModal() {
      this.settingsModalOpen = false;
      document.body.classList.remove("modal-open");
    },
    settingsByGroup(group) {
      return this.settings.filter(s => (s.group || "advanced") === group);
    },
    refreshSettings() {
      this.settingsLoaded = false;
      this.settings = [];
      if (this.settingsModalOpen) this.loadSettings();
    },
    async fetchDefaults() {
      try {
        const r = await fetch("/api/settings/defaults");
        if (!r.ok) return;
        const d = await r.json();
        if (d.quality_default && this.quality === "best") {
          this.quality = d.quality_default;
        }
        if (d.theme && d.theme !== "auto") {
          const local = localStorage.getItem("opengrab-theme");
          if (!local || local === "dark" || local === "light") {
            this.theme = d.theme;
            localStorage.setItem("opengrab-theme", d.theme);
            this.applyTheme();
          }
        }
        if (d.lang && d.lang !== "auto" && d.lang !== this.lang) {
          await this.reloadI18n(d.lang);
        }
        if (d.notifications_enabled) {
          const perm = await this.requestNotifPermission();
          if (perm === "granted") this.startWatchPoll();
        }
        if (d.subs_default) this.subsEnabled = true;
        if (d.thumb_default) this.thumbEnabled = true;
        if (d.infojson_default) this.infojsonEnabled = true;
      } catch (e) { /* no-op */ }
    },
    validateAndSave(s) {
      s._error = null;
      if (s.locked) return;
      const raw = s._editValue;
      if (s.type === "int") {
        const v = parseInt(String(raw), 10);
        if (isNaN(v) || String(v) !== String(raw).trim()) {
          s._error = this.t('ui.validate_int');
          return;
        }
        if (s.validation) {
          if (s.validation.min !== null && v < s.validation.min) {
            s._error = this.t('ui.validate_min', {min: s.validation.min});
            return;
          }
          if (s.validation.max !== null && v > s.validation.max) {
            s._error = this.t('ui.validate_max', {max: s.validation.max});
            return;
          }
        }
        s._editValue = v;
      }
      if (s.type === "string" && !s.options && String(raw).trim() === "") {
        s._error = this.t('ui.validate_empty');
        return;
      }
      this.saveSetting(s);
    },
    async saveSetting(s) {
      if (s.locked || s._error) return;
      s._saving = true;
      s._error = null;
      try {
        const body = JSON.stringify({ [s.key]: String(s._editValue) });
        const r = await fetch("/api/settings", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: body,
        });
        const d = await r.json();
        if (r.ok && d.updated && d.updated.includes(s.key)) {
          s.value = s._editValue;
          s.origin = "table";
          s.locked = false;
          this.showToast(this.t("ui.settings_saved", {setting_key: this.t(s.description || s.key)}), "success");
          // Side effects
          if (s.key === "theme") {
            localStorage.setItem("opengrab-theme", s._editValue);
            this.theme = s._editValue;
            this.applyTheme();
          }
          if (s.key === "quality_default") {
            this.quality = s._editValue;
          }
          if (s.key === "lang") {
            await this.reloadI18n(s._editValue);
          }
          if (s.key === "notifications_enabled") {
            const enabled = s._editValue === true || s._editValue === "true";
            if (enabled) {
              const perm = await this.requestNotifPermission();
              if (perm === "granted") {
                this.startWatchPoll();
              } else if (perm === "denied") {
                s._error = this.t('ui.validate_notif_denied');
              }
            } else {
              this.stopWatchPoll();
            }
          }
        } else {
          s._error = (d.errors && d.errors[s.key]) || d.detail || d.error || this.t('ui.error_save_setting');
        }
      } catch (e) {
        s._error = this.t('ui.error_connection');
      } finally {
        s._saving = false;
      }
    },
    showToast(msg, type) {
      this.toast = { show: true, message: msg, type: type };
      if (this._toastTimer) clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(() => {
        this.toast.show = false;
      }, 3000);
    },
    dismissToast() {
      this.toast.show = false;
      if (this._toastTimer) clearTimeout(this._toastTimer);
    },

    // ── Batch Playlist Download ────────────────
    batchJobIds: [],
    batchJobs: {},      // {jobId: {status, percent, speed, eta, error, filename, title}}
    batchPollTimer: null,
    batchDone: false,
    batchStartTime: null,

    // ── Inspect ───────────────────────────────
    classifyUrl(u) {
      const hasV = /[?&]v=/.test(u);
      const hasList = /[?&]list=/.test(u);
      if (hasList && !hasV) return "playlist";
      if (hasV && hasList) return "video+list";
      return "video";
    },

    async inspect() {
      if (!this.url.trim()) { this.errorMsg = this.t('ui.error_url_first'); return; }
      this.resetUI();
      const kind = this.classifyUrl(this.url.trim());

      if (kind === "playlist") {
        this.isPlaylist = true;
        this.meta = false;
        this.inspecting = true;
        await this.loadPlaylist();
        this.inspecting = false;
        return;
      }

      this.inspecting = true;
      try {
        const r = await fetch("/api/info?url=" + encodeURIComponent(this.url.trim()));
        if (!r.ok) {
          let msg = this.t('ui.error_analyze');
          try { msg = (await r.json()).detail || msg; } catch (e) {}
          throw new Error(msg);
        }
        const data = await r.json();
        this.meta = true;
        this.thumbnail = data.thumbnail || "";
        this.site = data.site || "";
        this.title = data.title || "—";
        const views = data.view_count
          ? " · " + Intl.NumberFormat("es-AR").format(data.view_count) + " views"
          : "";
        this.subtitle = (data.channel || "") + " · " + (data.duration_str || "") + views;
        this.formats = data.formats || [];
        this.showFormats = false;

        this.playlistAvailable = kind === "video+list";
        this.isPlaylist = false;
      } catch (err) {
        this.meta = false;
        this.errorMsg = err.message;
      } finally {
        this.inspecting = false;
      }
    },

    // Pegar en el input dispara el análisis (cero taps extra en mobile).
    onPaste(e) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData)?.getData("text") || "";
      this.url = text.trim();
      if (this.url) this.inspect();
    },
    // Botón "Pegar": lee el portapapeles y analiza de una.
    async pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (text && text.trim()) {
          this.url = text.trim();
          this.inspect();
        }
      } catch (e) {
        this.errorMsg = this.t('ui.error_clipboard');
      }
    },
    // Soltar una URL (o texto con link) sobre la tarjeta también analiza.
    onDrop(e) {
      const text = (e.dataTransfer?.getData("text") || "").trim();
      if (text) {
        this.url = text;
        this.inspect();
      }
    },

    // Limpiar el campo y resetear el estado analizado; devolver el foco.
    clearUrl() {
      this.url = "";
      this.resetUI();
      this.$nextTick(() => document.getElementById("url")?.focus());
    },

    async copyCommand() {
      const fmt = this.FORMATS[this.quality] || this.quality;
      const cmd = 'yt-dlp -f "' + fmt + '" --merge-output-format mp4 "' + this.url.trim() + '"';
      try {
        await navigator.clipboard.writeText(cmd);
      } catch (e) {
        const ta = document.createElement("textarea");
        ta.value = cmd; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
      }
      this.cmdCopied = true;
      setTimeout(() => { this.cmdCopied = false; }, 2000);
    },

    // ── Playlist ──────────────────────────────
    async loadPlaylist() {
      this.playlistLoading = true;
      try {
        const r = await fetch("/api/playlist?url=" + encodeURIComponent(this.url.trim()));
        if (!r.ok) {
          let msg = this.t('ui.error_playlist_load');
          try { msg = (await r.json()).detail || msg; } catch (e) {}
          throw new Error(msg);
        }
        const data = await r.json();
        this.playlistVideos = (data.videos || []).map(v => ({
          ...v,
          selected: false,
        }));
        this.playlistCount = data.count || 0;
      } catch (err) {
        this.playlistVideos = [];
        this.errorMsg = err.message;
      } finally {
        this.playlistLoading = false;
      }
    },

    selectedCount() {
      return this.playlistVideos.filter(v => v.selected).length;
    },
    saveExtraPref(type) {
      const key = type === "subs" ? "subs_default" : type === "thumb" ? "thumb_default" : "infojson_default";
      const val = type === "subs" ? this.subsEnabled : type === "thumb" ? this.thumbEnabled : this.infojsonEnabled;
      fetch("/api/settings", {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ [key]: String(val) }),
      }).catch(() => {});
    },

    toggleAllPlaylist(val) {
      this.playlistVideos.forEach(v => {
        if (!v.unavailable) v.selected = val;
      });
    },

    async downloadPlaylist() {
      const selected = this.playlistVideos.filter(v => v.selected && v.url);
      if (!selected.length) { this.errorMsg = this.t('ui.select_at_least_one'); return; }
      this.resetUI();
      this.downloading = true;
      this.addLine("$", "playlist: " + selected.length + " videos");

      // Collect URLs for batch download
      const urls = selected.map(v => v.url);

      try {
        const r = await fetch("/api/playlist/download", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ urls: urls, quality: this.quality }),
        });

        if (r.status === 429) {
          this.errorMsg = this.t('ui.error_rate_limit_short');
          this.downloading = false;
          return;
        }
        if (r.status === 507) {
          this.errorMsg = this.t('ui.error_storage_full_short');
          this.downloading = false;
          return;
        }
        if (!r.ok) {
          const data = await r.json().catch(() => ({}));
          this.errorMsg = data.detail || this.t('ui.error_batch_failed');
          this.downloading = false;
          return;
        }

        const data = await r.json();
        this.batchJobIds = data.job_ids || [];
        this.batchStartTime = Date.now();
        this.batchDone = false;
        this.batchJobs = {};

        // Start polling
        this.batchPollTimer = setInterval(() => this.pollBatchStatus(), 2000);
        // Initial poll immediately
        this.pollBatchStatus();

      } catch (err) {
        this.errorMsg = this.t('ui.error_network_short');
        this.downloading = false;
      }
    },

    pollBatchStatus() {
      if (this.batchDone || !this.batchJobIds.length) return;

      // Safety timeout check
      if (this.batchStartTime && Date.now() - this.batchStartTime > 60 * 60 * 1000) {
        this.batchDone = true;
        if (this.batchPollTimer) {
          clearInterval(this.batchPollTimer);
          this.batchPollTimer = null;
        }
        // Show warning but still show final status
      }

      const ids = this.batchJobIds.join(",");
      fetch(`/api/jobs/batch-status?ids=${ids}`, {credentials: 'include'})
        .then(r => r.json())
        .then(jobs => {
          jobs.forEach(j => {
            this.batchJobs[j.job_id] = j;
          });

          // Check if all terminal
          const allTerminal = this.batchJobIds.every(id => {
            const job = this.batchJobs[id];
            return job && ['done', 'error', 'interrupted'].includes(job.status);
          });

          if (allTerminal) {
            this.batchDone = true;
            if (this.batchPollTimer) {
              clearInterval(this.batchPollTimer);
              this.batchPollTimer = null;
            }
            // Summary
            const ok = this.batchJobIds.filter(id => this.batchJobs[id]?.status === 'done').length;
            const fail = this.batchJobIds.filter(id => this.batchJobs[id]?.status === 'error').length;
            const skipped = this.batchJobIds.filter(id => this.batchJobs[id]?.status === 'interrupted').length;
            this.addLine(
              fail === 0 ? "✓" : "✗",
              this.t('ui.batch_summary', {ok: ok, failed: fail, skipped: skipped}),
              fail === 0 ? "ok" : "err"
            );
            this.downloading = false;
            if (this.historyLoaded) this.loadHistory();
            // Success banner: mismo patrón que descarga individual.
            // Todos los jobs del batch comparten el mismo workdir:
            // abrir la carpeta de cualquiera muestra todos los archivos.
            if (ok > 0) {
              const firstDone = this.batchJobIds.find(id => this.batchJobs[id]?.status === 'done');
              if (firstDone) {
                this.successPath = this.t('ui.playlist_success', {ok: ok, failed: fail, skipped: skipped});
                this.lastJobId = firstDone;
              }
            }
          }
        })
        .catch(err => {});
    },

    // ── Download ──────────────────────────────
    async updateEngine() {
      if (this.engineUpdating) return;
      this.engineUpdating = true;
      this.engineMsg = this.t('ui.updating_engine');
      try {
        const r = await fetch("/api/engine/update", { method: "POST" });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || this.t('ui.engine_update_failed_short'));
        this.engineMsg = d.updated
          ? this.t('ui.engine_updated', {version: d.version})
          : this.t('ui.engine_latest');
      } catch (err) {
        this.engineMsg = this.t('ui.engine_update_error', {msg: err.message});
      } finally {
        this.engineUpdating = false;
      }
    },

    // ── Sesión: descargas concurrentes ────────
    // Jobs vivos ordenados: activos primero (por created asc), luego
    // terminados (por finished desc). Alimenta la lista de tarjetas.
    get sortedSessionJobs() {
      const active = [], done = [];
      const ACT = ["queued", "starting", "downloading", "processing"];
      for (const j of Object.values(this.sessionJobs)) {
        (ACT.includes(j.status) ? active : done).push(j);
      }
      active.sort((a, b) => (a.created || 0) - (b.created || 0));
      done.sort((a, b) => (b.finished || 0) - (a.finished || 0));
      return [...active, ...done];
    },
    get sessionActiveCount() {
      const ACT = ["queued", "starting", "downloading", "processing"];
      return Object.values(this.sessionJobs).filter(j => ACT.includes(j.status)).length;
    },
    // Historial sin los jobs que ahora se muestran como tarjeta (evita duplicar:
    // recién terminado = tarjeta; al descartarlo reaparece acá reactivamente).
    get visibleHistory() {
      const filtered = this.history.filter(e => !(e.job_id in this.sessionJobs));
      const q = (this.historyFilter || "").toLowerCase().trim();
      if (!q) return filtered;
      return filtered.filter(h =>
        (h.title || "").toLowerCase().includes(q) ||
        (h.url || "").toLowerCase().includes(q) ||
        (h.extractor || "").toLowerCase().includes(q)
      );
    },

    // Inserta/actualiza un job en el mapa preservando sus líneas de log.
    upsertJob(snap) {
      const prev = this.sessionJobs[snap.id] || { lines: [] };
      this.sessionJobs[snap.id] = { ...prev, ...snap, lines: prev.lines };
    },

    // Rehidrata el estado desde el server (al cargar / reabrir desde el tray).
    async rehydrate() {
      let jobs;
      try {
        const r = await fetch("/api/jobs", { credentials: "include" });
        if (!r.ok) return;
        jobs = await r.json();
      } catch (e) { return; }

      const ACT = ["queued", "starting", "downloading", "processing"];
      for (const j of jobs) {
        this.upsertJob({
          id: j.id, status: j.status, percent: j.percent || 0,
          speed: j.speed || "", eta: j.eta || "", note: j.note || "",
          title: j.title || "", filename: j.filename || "",
          filepath: j.filepath || "", error: j.error || "",
          created: j.created || 0, finished: j.finished || 0,
        });
        if (ACT.includes(j.status)) this.attachStream(j.id, false);
      }
      // Enfocar el activo más reciente para que la terminal muestre algo.
      const actives = this.sortedSessionJobs.filter(j => ACT.includes(j.status));
      if (actives.length && !this.focusedJobId) {
        this.focusJob(actives[actives.length - 1].id);
      }
    },

    // Abre (o reusa) el SSE de un job. Alimenta su tarjeta siempre; si está
    // en foco, espeja a la terminal escalar (preserva la UI actual).
    attachStream(jobId, focus = true) {
      if (focus) this.focusJob(jobId);
      if (this._streams[jobId]) return;  // ya conectado

      const ev = new EventSource("/api/jobs/" + jobId + "/events");
      this._streams[jobId] = ev;
      let lastStatus = (this.sessionJobs[jobId] || {}).status || "";
      let retries = 0;

      ev.onmessage = (m) => {
        const s = JSON.parse(m.data);
        this.upsertJob({ id: jobId, ...s });
        const focused = this.focusedJobId === jobId;

        if (s.status !== lastStatus) {
          lastStatus = s.status;
          if (s.status === "downloading") this.jobLine(jobId, "›", this.t('download.downloading_streams'));
          if (s.status === "processing")  this.jobLine(jobId, "›", s.note || this.t('download.processing'));
        }
        if (focused) this.mirrorToTerminal(jobId);

        if (s.status === "done") {
          this.jobLine(jobId, "✓", this.t('download.done_to', {filename: s.filename || ""}), "ok");
          if (focused) this.mirrorToTerminal(jobId);
          if (this.historyLoaded) this.loadHistory();
          this.closeStream(jobId);
        }
        if (s.status === "error") {
          this.jobLine(jobId, "✗", this.t('download.error_with_msg', {msg: s.error || this.t('ui.unknown')}), "err");
          if (focused) this.mirrorToTerminal(jobId);
          this.closeStream(jobId);
        }
        if (s.status === "cancelled") {
          this.jobLine(jobId, "✕", this.t('download.cancelled'), "err");
          if (focused) this.mirrorToTerminal(jobId);
          this.closeStream(jobId);
        }
      };
      ev.onerror = () => {
        if (retries < 5 && ev.readyState === EventSource.CONNECTING) { retries++; return; }
        this.closeStream(jobId);
      };
    },

    closeStream(jobId) {
      const ev = this._streams[jobId];
      if (ev) { ev.close(); delete this._streams[jobId]; }
    },

    jobLine(jobId, pfx, text, cls = "") {
      const j = this.sessionJobs[jobId];
      if (!j) return;
      j.lines = [...(j.lines || []), { pfx, text, cls }];
      if (this.focusedJobId === jobId) this.terminal = j.lines;
    },

    // Pasa un job a foco: la terminal escalar refleja su estado y su log.
    focusJob(jobId) {
      const j = this.sessionJobs[jobId];
      if (!j) return;
      this.focusedJobId = jobId;
      this.terminal = j.lines || [];
      this.mirrorToTerminal(jobId);
      if (j.status === "done" && !this.jobExtras[jobId]) {
        this.fetchJobExtras(jobId);
      }
    },
    async fetchJobExtras(jobId) {
      try {
        const r = await fetch("/api/jobs/" + jobId + "/extras");
        if (r.ok) {
          this.jobExtras = { ...this.jobExtras, [jobId]: await r.json() };
        }
      } catch (e) { /* no-op */ }
    },
    fmtSize(bytes) {
      if (!bytes || bytes < 1024) return (bytes || 0) + " B";
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1048576).toFixed(1) + " MB";
    },
    async exportBackup() {
      try {
        const r = await fetch("/api/backup/export");
        if (!r.ok) return;
        const blob = await r.blob();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "opengrab-backup-" + new Date().toISOString().slice(0, 10) + ".json";
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) { /* no-op */ }
    },
    importBackup() {
      document.getElementById("backup-file")?.click();
    },
    async handleBackupFile(e) {
      const file = e.target?.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        const s = data.settings ? Object.keys(data.settings).length : 0;
        const h = (data.history || []).length;
        const c = (data.channels || []).length;
        if (!confirm(this.t('ui.confirm_import', {settings: s, history: h, channels: c}))) return;
        const r = await fetch("/api/backup/import", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const result = await r.json();
        if (r.ok && result.ok) {
          this.showToast(this.t('ui.import_success', result.imported), "success");
          this.refreshSettings();
          if (this.historyOpen) { this.historyLoaded = false; this.history = []; this.toggleHistory(); }
        } else {
          this.showToast(result.detail || "Error al importar", "error");
        }
      } catch (e) {
        this.showToast("JSON inválido", "error");
      }
      e.target.value = "";
    },

    // Espeja el job en foco a los escalares que usa la terminal (sin tocar
    // el markup existente).
    mirrorToTerminal(jobId) {
      const j = this.sessionJobs[jobId];
      if (!j || this.focusedJobId !== jobId) return;
      const active = ["queued", "starting", "downloading", "processing"].includes(j.status);
      this.downloading = active;
      this.progress = j.percent || 0;
      this.dlSpeed = j.status === "downloading" ? (j.speed || "") : "";
      this.dlEta   = j.status === "downloading" ? (j.eta || "")   : "";
      this.progressDone = j.status === "done";
      if (j.status === "done") {
        this.progress = 100;
        this.downloadUrl = "/api/jobs/" + jobId + "/file";
        this.downloadFilename = j.filename || "";
        this.successPath = j.filepath || j.filename || "";
        this.lastJobId = jobId;
        this.errorMsg = ""; this.canRetry = false;
      } else if (j.status === "error") {
        this.errorMsg = j.error || this.t('ui.error_download_failed');
        this.canRetry = true;
        this.downloadUrl = ""; this.successPath = "";
      } else {
        this.downloadUrl = ""; this.successPath = "";
        this.errorMsg = ""; this.canRetry = false;
      }
    },

    async cancelJob(jobId) {
      try {
        const r = await fetch("/api/jobs/" + jobId + "/cancel", { method: "POST" });
        if (!r.ok) return;
        const d = await r.json();
        // "cancelled": estaba sólo en cola (sin thread ni SSE) -> actualizar acá.
        // "cancelling": corriendo -> el SSE entregará el estado 'cancelled'.
        if (d.status === "cancelled" && this.sessionJobs[jobId]) {
          this.sessionJobs[jobId].status = "cancelled";
          this.sessionJobs[jobId].finished = Date.now() / 1000;
          this.closeStream(jobId);
          if (this.focusedJobId === jobId) this.mirrorToTerminal(jobId);
        }
      } catch (e) { /* noop */ }
    },

    dismissJob(jobId) {
      this.closeStream(jobId);
      delete this.sessionJobs[jobId];
      if (this.focusedJobId === jobId) {
        this.focusedJobId = "";
        this.terminal = []; this.downloading = false; this.progress = 0;
        this.progressDone = false; this.downloadUrl = ""; this.successPath = "";
        this.lastJobId = ""; this.errorMsg = ""; this.canRetry = false;
      }
      fetch("/api/jobs/" + jobId + "/dismiss", { method: "POST" }).catch(() => {});
    },

    async download() {
      if (!this.url.trim()) return;
      // Reset solo de la vista enfocada (no toca otras tarjetas en curso).
      this.resetFocusView();

      let jobId, title = this.title !== "—" ? this.title : this.url.trim();
      try {
        const r = await fetch("/api/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: this.url.trim(), quality: this.quality, subs: this.subsEnabled, thumb: this.thumbEnabled, infojson: this.infojsonEnabled }),
        });
        if (!r.ok) throw new Error((await r.json()).detail || this.t('ui.error_create_job'));
        ({ job_id: jobId } = await r.json());
      } catch (err) {
        this.errorMsg = err.message;
        this.canRetry = true;
        this.downloading = false;
        return;
      }

      // Alta inmediata de la tarjeta; queda enfocada en la terminal.
      this.upsertJob({
        id: jobId, status: "queued", percent: 0, speed: "", eta: "",
        note: "", title, filename: "", filepath: "", error: "",
        created: Date.now() / 1000, finished: 0,
      });
      this.focusJob(jobId);
      this.jobLine(jobId, "$", "yt-dlp -f " + this.quality + " " + this.url.trim());
      this.attachStream(jobId, true);
    },

    async waitJob(jobId, title) {
      return new Promise((resolve) => {
        const ev = new EventSource("/api/jobs/" + jobId + "/events");
        let lastLiveIdx = -1;
        let retries = 0;
        const timeout = setTimeout(() => {
          this.addLine("✗", this.t('download.timeout_title', {title: title}), "err");
          ev.close(); resolve();
        }, 600000);
        ev.onmessage = (m) => {
          const s = JSON.parse(m.data);
          if (s.status === "downloading" && s.speed) {
            const txt = "  " + (s.percent || 0).toFixed(1) + "%  " + (s.speed || "") + (s.eta ? "  ETA " + s.eta : "");
            if (lastLiveIdx >= 0) {
              this.terminal[lastLiveIdx] = { pfx: "›", text: txt, cls: "", live: true };
              this.terminal = [...this.terminal];
            } else {
              const idx = this.terminal.length;
              this.terminal = [...this.terminal, { pfx: "›", text: txt, cls: "", live: true }];
              lastLiveIdx = idx;
            }
          }
          if (s.status === "done") { clearTimeout(timeout); this.addLine("✓", this.t('download.ok_filename', {filename: title}), "ok"); ev.close(); resolve(); }
          if (s.status === "error") { clearTimeout(timeout); this.addLine("✗", this.t('download.error_title', {title: s.error || this.t('ui.unknown')}), "err"); ev.close(); resolve(); }
        };
        ev.onerror = () => {
          if (retries < 3 && ev.readyState === EventSource.CONNECTING) { retries++; return; }
          clearTimeout(timeout); ev.close(); resolve();
        };
      });
    },

    // ── UI helpers ────────────────────────────
    addLine(pfx, text, cls = "") {
      this.terminal = [...this.terminal, { pfx, text, cls }];
    },

    // Resetea SOLO la vista del job en foco (escalares de la terminal),
    // sin tocar las tarjetas de otras descargas en curso.
    resetFocusView() {
      this.focusedJobId = "";
      this.terminal = [];
      this.dlSpeed = "";
      this.dlEta = "";
      this.showTerminal = false;
      this.progress = 0;
      this.progressDone = false;
      this.downloadUrl = "";
      this.downloadFilename = "";
      this.successPath = "";
      this.lastJobId = "";
      this.errorMsg = "";
      this.canRetry = false;
    },

    resetUI() {
      this.resetFocusView();
      this.isPlaylist = false;
      this.playlistAvailable = false;
      this.playlistVideos = [];
      this.formats = [];
      this.showFormats = false;
      // Clear batch state
      if (this.batchPollTimer) {
        clearInterval(this.batchPollTimer);
        this.batchPollTimer = null;
      }
      this.batchJobIds = [];
      this.batchJobs = {};
      this.batchDone = false;
      this.batchStartTime = null;
    },

    async openFolder(jobId) {
      if (!jobId) return;
      await fetch("/api/jobs/" + jobId + "/open-folder", { method: "POST" });
    },

    // Busca el library_dir configurado para sugerirlo como default del prompt.
    libraryDirDefault() {
      if (this.lastSaveDir) return this.lastSaveDir;
      const s = (this.settings || []).find(x => x.key === "library_dir");
      return (s && s.value) || "";
    },

    // "Guardar en…": mueve el archivo (server-side) a la carpeta elegida.
    // Prioriza el picker nativo de WebView2; si no existe (browser / red),
    // cae a pedir la ruta del servidor por prompt.
    async saveTo(jobId) {
      if (!jobId || this.savingTo) return;
      let dest = null;
      if (window.pywebview?.api?.pick_folder) {
        try { dest = await window.pywebview.api.pick_folder(); }
        catch (e) { dest = null; }
        if (!dest) return;  // usuario canceló
      } else {
        dest = window.prompt(this.t('ui.save_as'),
                             this.libraryDirDefault());
        if (!dest || !dest.trim()) return;
        dest = dest.trim();
      }
      this.savingTo = true;
      try {
        const r = await fetch("/api/jobs/" + jobId + "/move", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dest }),
        });
        if (!r.ok) {
          let msg = this.t('ui.error_save_file');
          try { const e = await r.json(); if (e.detail) msg = e.detail; } catch (_) {}
          this.errorMsg = msg;
          return;
        }
        const d = await r.json();
        this.lastSaveDir = dest;
        this.successPath = d.filepath || this.successPath;
        // Mantener funcionando "Abrir carpeta" y el link de descarga.
        if (this.sessionJobs[jobId]) this.sessionJobs[jobId].filepath = d.filepath;
        this.errorMsg = "";
      } catch (e) {
        this.errorMsg = this.t('ui.error_save_file');
      } finally {
        this.savingTo = false;
      }
    },

    // ── History ───────────────────────────────
    async loadHistory() {
      try {
        const r = await fetch("/api/history?limit=15");
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        // Defensa: no revivir items con borrado diferido en vuelo.
        this.history = data.filter(e => !(e.job_id in this.pendingDeletes));
      } catch (e) {
        this.history = [];
      }
      this.historyLoaded = true;
    },
    async toggleHistory() {
      this.historyOpen = !this.historyOpen;
      if (this.historyOpen && !this.historyLoaded) {
        await this.loadHistory();
      }
    },
    historyBadge() {
      if (this.historyOpen || !this.history.length) return "";
      return " · " + this.history.length;
    },

    // ── Deferred destruction (patron "undo send") ──
    // El click NO toca el backend: saca el item, arranca un timer de 5s y
    // muestra el toast. Deshacer cancela el timer (nada se borro). Si el timer
    // vence, recien ahi se dispara el DELETE real (DB + secure-delete del archivo,
    // irreversible). "No confirmado = no destruido".
    deleteHistoryEntry(jobId) {
      const entry = this.history.find(e => e.job_id === jobId);
      if (!entry) return;
      this._removeWithFade(jobId);
      const timeoutId = setTimeout(() => this._executeDelete(jobId), 5000);
      this.pendingDeletes[jobId] = { timeoutId, entry };
      this._updateToast();
    },
    _removeWithFade(jobId) {
      const drop = () => { this.history = this.history.filter(e => e.job_id !== jobId); };
      const el = document.querySelector('.h-entry[data-job-id="' + jobId + '"]');
      if (el) {
        el.classList.add("removing");
        setTimeout(drop, 300);  // espera la transicion CSS antes del splice
      } else {
        drop();  // degradacion elegante si no se encuentra el nodo
      }
    },
    async _executeDelete(jobId) {
      const pending = this.pendingDeletes[jobId];
      if (!pending) return;
      try {
        const r = await fetch("/api/history/" + jobId, { method: "DELETE" });
        if (!r.ok) {
          let detail = this.t('ui.error_server');
          try { detail = (await r.json()).detail || detail; } catch (_) {}
          throw new Error(detail);
        }
        // Exito: si no quedan mas pendientes, success toast; si quedan, refrescar cuenta
        delete this.pendingDeletes[jobId];
        if (Object.keys(this.pendingDeletes).length || this._clearAllPending) {
          this._updateToast();
        } else {
          this.toast = { show: true, message: this.t('ui.deleted'), type: 'success' };
          setTimeout(() => { if (this.toast.type === 'success') this.dismissToast(); }, 3000);
        }
      } catch (e) {
        // El DELETE fallo: el archivo sigue intacto, restauramos el item.
        this.history.push(pending.entry);
        this.history.sort((a, b) => (b.completed || 0) - (a.completed || 0));
        this.errorMsg = this.t('ui.error_delete_entry', {msg: e.message});
        delete this.pendingDeletes[jobId];
        this._updateToast();
      }
    },
    undoDelete() {
      // Cancela todos los timers en vuelo (individuales y clear-all).
      Object.values(this.pendingDeletes).forEach(p => clearTimeout(p.timeoutId));
      if (this._clearAllPending) clearTimeout(this._clearAllPending.timeoutId);
      // Reconstruye la lista. clear-all e individuales son mutuamente excluyentes:
      // clearAllHistory absorbe los pendientes individuales en su snapshot.
      if (this._clearAllPending) {
        this.history = this._clearAllPending.history;
      } else {
        Object.values(this.pendingDeletes).forEach(p => this.history.push(p.entry));
        this.history.sort((a, b) => (b.completed || 0) - (a.completed || 0));
      }
      this.pendingDeletes = {};
      this._clearAllPending = null;
      this.toast = { show: false, message: "", type: null };
    },
    _updateToast() {
      const n = Object.keys(this.pendingDeletes).length;
      if (this._clearAllPending) {
        this.toast = { show: true, message: this.t('ui.history_cleared'), type: 'pending' };
      } else if (n > 0) {
        this.toast = { show: true, message: this.t('ui.history_cleared_count', {count: n}), type: 'pending' };
      } else {
        this.toast = { show: false, message: "", type: null };
      }
    },
    dismissToast() {
      this.toast = { show: false, message: "", type: null };
    },
    acceptDeletes() {
      const ids = Object.keys(this.pendingDeletes);
      const hasClearAll = !!this._clearAllPending;
      Object.values(this.pendingDeletes).forEach(p => clearTimeout(p.timeoutId));
      if (this._clearAllPending) clearTimeout(this._clearAllPending.timeoutId);
      this.toast = { show: true, message: this.t('ui.deleting_history'), type: 'pending' };
      for (const jobId of ids) this._executeDelete(jobId);
      if (hasClearAll) this._executeClearAll();
    },

    clearAllHistory() {
      if (!this.history.length && !Object.keys(this.pendingDeletes).length) return;
      // Absorbe los borrados individuales pendientes: cancela sus timers y suma
      // sus entries al snapshot, asi "Deshacer" restaura TODO de una.
      Object.values(this.pendingDeletes).forEach(p => clearTimeout(p.timeoutId));
      const snapshot = [
        ...this.history,
        ...Object.values(this.pendingDeletes).map(p => p.entry),
      ].sort((a, b) => (b.completed || 0) - (a.completed || 0));
      this.pendingDeletes = {};
      if (this._clearAllPending) clearTimeout(this._clearAllPending.timeoutId);
      this.history = [];  // optimistic
      const timeoutId = setTimeout(() => this._executeClearAll(), 5000);
      this._clearAllPending = { timeoutId, history: snapshot };
      this._updateToast();
    },
    async _executeClearAll() {
      const pending = this._clearAllPending;
      if (!pending) return;
      try {
        const r = await fetch("/api/history", { method: "DELETE" });
        if (!r.ok) {
          let detail = this.t('ui.error_server');
          try { detail = (await r.json()).detail || detail; } catch (_) {}
          throw new Error(detail);
        }
        this._clearAllPending = null;
        this.toast = { show: true, message: this.t('ui.history_deleted'), type: 'success' };
        setTimeout(() => { if (this.toast.type === 'success') this.dismissToast(); }, 3000);
      } catch (e) {
        this.history = pending.history;
        this.errorMsg = this.t('ui.error_clear_history', {msg: e.message});
        this._clearAllPending = null;
        this._updateToast();
      }
    },

    // ── Storage ───────────────────────────────
    formatMB(bytes) { return (bytes / 1048576).toFixed(1) + " MB"; },
    formatAge(hours) {
      if (hours < 1) return Math.round(hours * 60) + "min";
      if (hours < 24) return Math.round(hours) + "h";
      return Math.round(hours / 24) + "d";
    },
    async toggleStorage() {
      this.storageOpen = !this.storageOpen;
      if (this.storageOpen && !this.storageLoaded) {
        await this.loadStorage();
      }
    },
    storageBadge() {
      if (this.storageOpen || !this.storageLoaded) return "";
      const dirs = (this.storage.workdirs || []).length;
      return dirs > 0 ? " · " + dirs + " dirs" : "";
    },
    async loadStorage() {
      try {
        const r = await fetch("/api/storage");
        this.storage = await r.json();
      } catch (e) {
        this.storage = { total_usage_bytes: 0, workdirs: [], loose_files: [], db_size_bytes: 0 };
      }
      this.storageLoaded = true;
    },
    async cleanupStorage() {
      if (!confirm(this.t('ui.confirm_cleanup'))) return;
      this.storageMsg = this.t('ui.cleaning');
      try {
        const r = await fetch("/api/storage/cleanup", { method: "POST" });
        const d = await r.json();
        this.storageMsg = this.t('ui.cleanup_success', {count: d.cleaned, bytes: this.formatMB(d.freed_bytes)});
        await this.loadStorage();
      } catch (e) {
        this.storageMsg = this.t('ui.error_cleanup');
      }
    },
    async cleanupAllStorage() {
      if (!confirm(this.t('ui.confirm_cleanup_all'))) return;
      this.storageMsg = this.t('ui.deleting');
      try {
        const r = await fetch("/api/storage/cleanup-all", { method: "POST" });
        const d = await r.json();
        this.storageMsg = this.t('ui.cleanup_all_success', {count: d.cleaned, bytes: this.formatMB(d.freed_bytes)});
        await this.loadStorage();
      } catch (e) {
        this.storageMsg = this.t('ui.error_delete_workdirs');
      }
    },

    // ── Channels ──────────────────────────────
    async toggleChannels() {
      this.channelsOpen = !this.channelsOpen;
      if (this.channelsOpen && !this.channelsLoaded) {
        await this.loadChannels();
      }
    },
    channelsBadge() {
      if (this.channelsOpen || !this.channelsLoaded) return "";
      const n = (this.channels || []).length;
      return n > 0 ? " · " + n : "";
    },
    async loadChannels() {
      try {
        const r = await fetch("/api/channels");
        this.channels = await r.json();
      } catch (e) {
        this.channels = [];
      }
      this.channelsLoaded = true;
    },
    async addChannel() {
      if (!this.newChannelUrl.trim()) return;
      try {
        const r = await fetch("/api/channels", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url: this.newChannelUrl.trim(),
            quality: this.newChannelQuality,
            interval_minutes: parseInt(this.newChannelInterval) || 60,
          }),
        });
        if (!r.ok) throw new Error((await r.json()).detail || this.t('ui.error'));
        this.newChannelUrl = "";
        await this.loadChannels();
      } catch (err) {
        this.errorMsg = err.message;
      }
    },
    async toggleChannel(ch) {
      try {
        const r = await fetch("/api/channels/" + ch.id, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: ch.enabled ? 0 : 1 }),
        });
        if (r.ok) ch.enabled = ch.enabled ? 0 : 1;
      } catch (e) {}
    },
    async checkChannel(channelId) {
      const ch = this.channels.find(c => c.id === channelId);
      if (!ch) return;
      ch._checking = true;
      try {
        const r = await fetch("/api/channels/" + channelId + "/check", { method: "POST" });
        const d = await r.json();
        if (d.new_videos > 0) this.errorMsg = this.t('ui.videos_found', {count: d.new_videos});
      } catch (err) {
        this.errorMsg = this.t('ui.error_check_channel');
      }
      ch._checking = false;
    },
    async deleteChannel(channelId) {
      try {
        await fetch("/api/channels/" + channelId, { method: "DELETE" });
        await this.loadChannels();
      } catch (e) {}
    },

    // ── Duration formatter ────────────────────
    fmtDuration(secs) {
      if (!secs) return "";
      const d = new Date(secs * 1000).toISOString();
      return d.substring(11, 19).replace(/^00:/, "");
    },
  }));
});
</script>
